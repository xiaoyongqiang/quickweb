name: Go-CI-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true  # 🚀 这行就开启了 go mod 依赖缓存

      - name: 缓存 golangci-lint 二进制文件
        id: cache-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: ${{ runner.os }}-lint-v1.64.5-go1.26

      - name: 安装 golangci-lint (仅在无缓存时)
        if: steps.cache-lint.outputs.cache-hit != 'true'
        run: |
          # 直接用 Go 1.26 现场安装，确保底层版本对齐
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: 运行 静态检查 (Lint)
        run: |
          # 加上 --disable=typecheck 绕过你之前的标准库循环引用报错
          ~/go/bin/golangci-lint run --timeout=5m --disable=typecheck

      - name: 编译测试
        run: |
          go mod tidy
          go build -v -o test-bin .